<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Neon glow filter for site name -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline overlay pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1200" height="4">
      <rect width="1200" height="2" fill="rgba(255,255,255,0.03)"/>
      <rect y="2" width="1200" height="2" fill="transparent"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Scanline overlay -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Site name with neon glow -->
  <text
    x="600" y="280"
    text-anchor="middle"
    font-family="'JetBrains Mono', monospace"
    font-size="64"
    font-weight="700"
    fill="#00ff9f"
    filter="url(#neonGlow)"
  >yugalarora.com</text>

  <!-- Tagline in dim text -->
  <text
    x="600" y="360"
    text-anchor="middle"
    font-family="'JetBrains Mono', monospace"
    font-size="20"
    fill="#4a4a6a"
  >Terminal-grade thoughts on systems, Go, Linux, and the craft of building software.</text>
</svg>
